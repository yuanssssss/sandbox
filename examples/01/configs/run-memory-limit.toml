[process]
argv = ["./examples/01/build/memory_limit", "64"]
cwd = "."
env = ["LANG=C"]
clear_env = true

[limits]
wall_time_ms = 3000
memory_bytes = 16777216

[io]
artifact_dir = ".sandbox-runs/examples-01/run-memory-limit"

[security]
seccomp_profile = "default"

[filesystem]
enable_rootfs = false

# 这个样例依赖 cgroup v2 的 memory controller。
# 如果宿主机不支持可写 cgroup v2，运行时会得到 capability unavailable。
