[process]
argv = ["/bin/echo", "hello from sandbox"]
cwd = "."
env = ["LANG=C", "PATH=/usr/bin:/bin"]
clear_env = true

[limits]
wall_time_ms = 1000
cpu_time_ms = 1000
# 默认示例不主动启用 cgroup 限额，便于在普通开发环境直接运行。
# 如需启用 cgroup v2：
# memory_bytes = 134217728
# max_processes = 32

[io]
artifact_dir = ".sandbox-runs/example"

[security]
seccomp_profile = "default"

[filesystem]
enable_rootfs = true
enter_user_namespace = false
enter_mount_namespace = false
enter_pid_namespace = false
enter_network_namespace = false
enter_ipc_namespace = false
apply_mounts = false
chroot_to_rootfs = false
drop_capabilities = true
work_dir = "/work"
tmp_dir = "/tmp"
executable_bind_paths = ["/bin", "/usr/bin"]

# 更强隔离示例：
# enter_user_namespace = true
# enter_mount_namespace = true
# enter_pid_namespace = true
# apply_mounts = true
# chroot_to_rootfs = true
# mount_proc = true
